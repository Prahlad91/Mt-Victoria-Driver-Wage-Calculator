services:
  - type: web
    name: mt-victoria-driver-wage-calculator
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER_PYTHON_VERSION
        value: 3.11.0
