services:
  - type: web
    name: mt-victoria-wage-calc-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://mt-victoria-wage-calc.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
